name: Build mmwf

on:
  workflow_dispatch:
  push:
    branches: [main]

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: leslie159357/mmwf

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - goos: linux
            goarch: amd64
            output: mmwf-linux-amd64
          - goos: windows
            goarch: amd64
            output: mmwf-windows-amd64.exe
    steps:
      - uses: actions/checkout@v4
        with:
          repository: Leslie159357/mmwf
          ref: main

      - name: Get missing files from original repo
        run: |
          mkdir -p cmd/server subscribes
          curl -sL "https://raw.githubusercontent.com/iluobei/miaomiaowuX/main/cmd/server/main.go" -o cmd/server/main.go
          curl -sL "https://raw.githubusercontent.com/iluobei/miaomiaowuX/main/cmd/server/cors.go" -o cmd/server/cors.go
          curl -sL "https://raw.githubusercontent.com/iluobei/miaomiaowuX/main/subscribes/embed.go" -o subscribes/embed.go
          curl -sL "https://raw.githubusercontent.com/iluobei/miaomiaowuX/main/subscribes/.gitignore" -o subscribes/.gitignore
          curl -sL "https://raw.githubusercontent.com/iluobei/miaomiaowuX/main/subscribes/.keep.yaml" -o subscribes/.keep.yaml
          curl -sL "https://raw.githubusercontent.com/iluobei/miaomiaowuX/main/subscribes/README.md" -o subscribes/README.md

      - name: Extract frontend dist from official release binary
        run: |
          DIST="internal/web/dist"
          mkdir -p "$DIST"

          # Step 1: Download official Linux binary (62MB with full frontend)
          echo "Downloading official release binary..."
          curl -sL "https://github.com/iluobei/miaomiaowuX/releases/download/v0.3.5/mmwx-linux-amd64" -o /tmp/mmwx-official
          chmod +x /tmp/mmwx-official
          echo "Official binary size: $(du -h /tmp/mmwx-official | cut -f1)"

          # Step 2: Start the official binary in background (it will serve on 12889)
          # It may fail license check but HTTP server might still start
          echo "Starting official binary to extract frontend..."
          mkdir -p /tmp/mmwx-data
          cd /tmp
          timeout 30 /tmp/mmwx-official --port 18999 --data-dir /tmp/mmwx-data &
          OFFICIAL_PID=$!
          sleep 5

          # Step 3: Check if server started
          if kill -0 $OFFICIAL_PID 2>/dev/null; then
            echo "Server started with PID $OFFICIAL_PID, extracting frontend..."
            
            # Download the frontend SPA completely using wget spider mode
            cd "$DIST"
            wget -q -r -np -nH --cut-dirs=0 -P . http://127.0.0.1:18999/ 2>&1 || true
            
            # Also specifically download all assets
            wget -q -r -np -nH --cut-dirs=0 -P . http://127.0.0.1:18999/assets/ 2>&1 || true
            
            kill $OFFICIAL_PID 2>/dev/null
          else
            echo "Server failed to start, using fallback method..."
          fi

          # Step 4: Fallback - try docker extraction
          if [ ! -f "$DIST/index.html" ] || [ ! -s "$DIST/index.html" ]; then
            echo "Binary extraction failed, trying Docker..."
            docker pull ghcr.io/iluobei/miaomiaowux:latest 2>/dev/null || docker pull ghcr.io/iluobei/miaomiaowuX:latest 2>/dev/null || true
            if docker image ls | grep -q "miaomiaowu"; then
              docker create --name mmwx-tmp $(docker image ls | grep miaomiaowu | head -1 | awk '{print $1":"$2}')
              docker cp mmwx-tmp:/app/internal/web/dist/. "$DIST/" 2>/dev/null || docker cp mmwx-tmp:/app/dist/. "$DIST/" 2>/dev/null || true
              docker rm mmwx-tmp
            fi
          fi

          # Step 5: Verify
          echo "=== DIST VERIFICATION ==="
          cd /tmp
          find "$DIST" -type f 2>/dev/null | head -20
          echo "..."
          echo "Total files: $(find "$DIST" -type f 2>/dev/null | wc -l)"
          echo "Dist size: $(du -sh "$DIST" 2>/dev/null | cut -f1)"

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Build binary
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: 0
        run: |
          mkdir -p build
          go build -trimpath -ldflags="-s -w" -o "build/${{ matrix.output }}" ./cmd/server

      - name: Upload binary artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.output }}
          path: build/${{ matrix.output }}
          retention-days: 30

  docker:
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4
        with:
          repository: Leslie159357/mmwf
          ref: main

      - name: Download linux binary
        uses: actions/download-artifact@v4
        with:
          name: mmwf-linux-amd64

      - name: Copy binary (bypass .dockerignore)
        run: |
          cp mmwf-linux-amd64 mmwf-cracked
          chmod +x mmwf-cracked

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        run: |
          docker build -f Dockerfile.cracked \
            -t ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest \
            -t ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.sha }} \
            .
          docker push --all-tags ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
