name: Build mmwf

on:
  workflow_dispatch:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - goos: linux
            goarch: amd64
            output: mmwf-linux-amd64
          - goos: windows
            goarch: amd64
            output: mmwf-windows-amd64.exe
    steps:
      - uses: actions/checkout@v4
        with:
          repository: Leslie159357/mmwf
          ref: main

      - name: Get cmd/server
        run: |
          mkdir -p cmd/server
          curl -sL "https://raw.githubusercontent.com/iluobei/miaomiaowuX/main/cmd/server/main.go" -o cmd/server/main.go
          curl -sL "https://raw.githubusercontent.com/iluobei/miaomiaowuX/main/cmd/server/cors.go" -o cmd/server/cors.go

      - name: Download frontend from miaomiaowux.com
        run: |
          SITE="https://miaomiaowux.com"
          DIST="internal/web/dist"
          mkdir -p "$DIST/assets" "$DIST/images"
          curl -sL "$SITE/" -o "$DIST/index.html"
          for url in $(grep -oP '(?:src|href)="([^"]+\.(js|css))"' "$DIST/index.html" | sed 's/.*"\(.*\)".*/\1/'); do
            echo "Downloading: $url"
            mkdir -p "$DIST/$(dirname $url)"
            curl -sL "$SITE$url" -o "$DIST/$url"
          done
          echo "Dist files: $(find $DIST -type f | wc -l)"

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Build
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: 0
        run: |
          mkdir -p build
          go build -trimpath -ldflags="-s -w" -o "build/${{ matrix.output }}" ./cmd/server

      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.output }}
          path: build/${{ matrix.output }}
          retention-days: 30