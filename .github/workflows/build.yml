name: Build mmwf

on:
  workflow_dispatch:
  push:
    branches: [main]

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: leslie159357/mmwf

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - goos: linux
            goarch: amd64
            output: mmwf-linux-amd64
          - goos: windows
            goarch: amd64
            output: mmwf-windows-amd64.exe
    steps:
      - uses: actions/checkout@v4
        with:
          repository: Leslie159357/mmwf
          ref: main

      - name: Get missing files from original repo
        run: |
          mkdir -p cmd/server subscribes internal/web/dist/assets internal/web/dist/images
          curl -sL "https://raw.githubusercontent.com/iluobei/miaomiaowuX/main/cmd/server/main.go" -o cmd/server/main.go
          curl -sL "https://raw.githubusercontent.com/iluobei/miaomiaowuX/main/cmd/server/cors.go" -o cmd/server/cors.go
          curl -sL "https://raw.githubusercontent.com/iluobei/miaomiaowuX/main/subscribes/embed.go" -o subscribes/embed.go
          curl -sL "https://raw.githubusercontent.com/iluobei/miaomiaowuX/main/subscribes/.gitignore" -o subscribes/.gitignore
          curl -sL "https://raw.githubusercontent.com/iluobei/miaomiaowuX/main/subscribes/.keep.yaml" -o subscribes/.keep.yaml
          curl -sL "https://raw.githubusercontent.com/iluobei/miaomiaowuX/main/subscribes/README.md" -o subscribes/README.md

      - name: Download frontend from miaomiaowux.com
        run: |
          SITE="https://miaomiaowux.com"
          DIST="internal/web/dist"
          mkdir -p "$DIST/assets" "$DIST/images"
          curl -sL "$SITE/" -o "$DIST/index.html"
          for url in $(grep -oP '(?:src|href)="([^"]+\.(js|css))"' "$DIST/index.html" | sed 's/.*"\(.*\)".*/\1/'); do
            echo "DL asset: $url"
            mkdir -p "$DIST/$(dirname $url)"
            curl -sL "$SITE$url" -o "$DIST/$url"
          done
          curl -sL "$SITE/images/favicon.ico" -o "$DIST/images/favicon.ico"
          touch "$DIST/images/.gitkeep"
          echo "Dist files: $(find $DIST -type f | wc -l)"

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Build binary
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: 0
        run: |
          mkdir -p build
          go build -trimpath -ldflags="-s -w" -o "build/${{ matrix.output }}" ./cmd/server

      - name: Upload binary artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.output }}
          path: build/${{ matrix.output }}
          retention-days: 30

  docker:
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4
        with:
          repository: Leslie159357/mmwf
          ref: main

      - name: Download linux binary
        uses: actions/download-artifact@v4
        with:
          name: mmwf-linux-amd64
          path: build/

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.cracked
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.sha }}