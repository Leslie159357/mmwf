name: Build mmwf

on:
  workflow_dispatch:
  push:
    branches: [main]

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: leslie159357/mmwf

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - goos: linux
            goarch: amd64
            output: mmwf-linux-amd64
          - goos: windows
            goarch: amd64
            output: mmwf-windows-amd64.exe
    steps:
      - uses: actions/checkout@v4
        with:
          repository: Leslie159357/mmwf
          ref: main

      - name: Get missing files from original repo
        run: |
          mkdir -p cmd/server subscribes
          curl -sL "https://raw.githubusercontent.com/iluobei/miaomiaowuX/main/cmd/server/main.go" -o cmd/server/main.go
          curl -sL "https://raw.githubusercontent.com/iluobei/miaomiaowuX/main/cmd/server/cors.go" -o cmd/server/cors.go
          curl -sL "https://raw.githubusercontent.com/iluobei/miaomiaowuX/main/subscribes/embed.go" -o subscribes/embed.go
          curl -sL "https://raw.githubusercontent.com/iluobei/miaomiaowuX/main/subscribes/.gitignore" -o subscribes/.gitignore
          curl -sL "https://raw.githubusercontent.com/iluobei/miaomiaowuX/main/subscribes/.keep.yaml" -o subscribes/.keep.yaml
          curl -sL "https://raw.githubusercontent.com/iluobei/miaomiaowuX/main/subscribes/README.md" -o subscribes/README.md

      - name: Extract frontend dist from official release binary
        shell: bash -e {0}
        run: |
          DIST_ABS="${GITHUB_WORKSPACE}/internal/web/dist"
          rm -rf /tmp/frontend "$DIST_ABS"
          mkdir -p /tmp/frontend/assets /tmp/frontend/images "$DIST_ABS"

          echo "Downloading official v0.3.5 Linux binary..."
          curl -sL "https://github.com/iluobei/miaomiaowuX/releases/download/v0.3.5/mmwx-linux-amd64" -o /tmp/mmwx-official
          chmod +x /tmp/mmwx-official
          echo "Size: $(du -h /tmp/mmwx-official | cut -f1)"

          echo "Starting official binary on port 18999..."
          mkdir -p /tmp/mmwx-data /tmp/mmwx-data/logs
          cd /tmp/mmwx-data
          PORT=18999 /tmp/mmwx-official > /tmp/mmwx-log.txt 2>&1 &
          OFFICIAL_PID=$!
          echo "PID: $OFFICIAL_PID"

          sleep 8

          if kill -0 $OFFICIAL_PID 2>/dev/null; then
            echo "Server is running! Extracting frontend..."

            # Download index.html
            curl -sL "http://127.0.0.1:18999/" -o /tmp/frontend/index.html
            echo "index.html: $(wc -c < /tmp/frontend/index.html) bytes"
            head -5 /tmp/frontend/index.html

            # Download favicon
            curl -sL "http://127.0.0.1:18999/images/favicon.ico" -o /tmp/frontend/images/favicon.ico 2>/dev/null || true

            # Download JS/CSS from index.html - skip external URLs (containing ://)
            for url in $(grep -oP '(?:src|href)="([^"]+\.(js|css))"' /tmp/frontend/index.html 2>/dev/null | sed 's/.*"\(.*\)".*/\1/'); do
              case "$url" in
                *"://"*) echo "SKIP external: $url" ;;
                *)
                  dir=$(dirname "$url")
                  mkdir -p "/tmp/frontend/$dir"
                  echo "DL: $url"
                  curl -sL "http://127.0.0.1:18999/$url" -o "/tmp/frontend/$url"
                  ;;
              esac
            done

            # Find the actual main JS (module script, NOT external URLs)
            MAIN_JS=$(grep -oP 'type="module"[^>]*src="([^"]+\.js)"' /tmp/frontend/index.html 2>/dev/null | sed 's/.*src="\(.*\)".*/\1/')
            if [ -z "$MAIN_JS" ]; then
              # Fallback: first non-external JS
              MAIN_JS=$(grep -oP 'src="([^"]+\.js)"' /tmp/frontend/index.html 2>/dev/null | sed 's/.*"\(.*\)".*/\1/' | grep -v '://' | head -1)
            fi
            if [ -z "$MAIN_JS" ]; then
              MAIN_JS=$(grep -oP 'src="([^"]+)"' /tmp/frontend/index.html 2>/dev/null | sed 's/.*"\(.*\)".*/\1/' | grep '\.js$' | grep -v '://' | head -1)
            fi

            if [ -n "$MAIN_JS" ]; then
              # Strip leading slash for local path
              MAIN_FILE="/tmp/frontend/${MAIN_JS#/}"
              if [ -f "$MAIN_FILE" ]; then
                echo "Main JS: $MAIN_JS ($(wc -c < "$MAIN_FILE") bytes)"
                # Extract all .js references from main JS - skip external URLs
                for jsref in $(grep -oP '"[a-zA-Z0-9._/-]+\.js"' "$MAIN_FILE" 2>/dev/null | sed 's/"//g' | sort -u); do
                  case "$jsref" in
                    *"://"*) echo "SKIP chunk: $jsref" ;;
                    *)
                      dir=$(dirname "$jsref")
                      mkdir -p "/tmp/frontend/$dir"
                      if [ ! -f "/tmp/frontend/$jsref" ]; then
                        echo "CHUNK: $jsref"
                        curl -sL "http://127.0.0.1:18999/$jsref" -o "/tmp/frontend/$jsref"
                      fi
                      ;;
                  esac
                done
              else
                echo "Main JS file not found at: $MAIN_FILE"
              fi
            else
              echo "WARNING: No main JS found"
            fi

            kill $OFFICIAL_PID 2>/dev/null || true
            wait $OFFICIAL_PID 2>/dev/null || true
          else
            echo "Server failed to start. Logs:"
            cat /tmp/mmwx-log.txt
          fi

          echo "Copying frontend files to $DIST_ABS..."
          cp -r /tmp/frontend/* "$DIST_ABS/" 2>/dev/null

          echo "=== DIST VERIFICATION ==="
          find "$DIST_ABS" -type f 2>/dev/null
          echo "Total files: $(find "$DIST_ABS" -type f 2>$null | wc -l)"
          echo "JS files: $(find "$DIST_ABS" -name "*.js" 2>$null | wc -l)"
          echo "CSS files: $(find "$DIST_ABS" -name "*.css" 2>$null | wc -l)"

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Build binary
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: 0
        run: |
          mkdir -p build
          go build -trimpath -ldflags="-s -w" -o "build/${{ matrix.output }}" ./cmd/server

      - name: Upload binary artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.output }}
          path: build/${{ matrix.output }}
          retention-days: 30

  docker:
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4
        with:
          repository: Leslie159357/mmwf
          ref: main

      - name: Download linux binary
        uses: actions/download-artifact@v4
        with:
          name: mmwf-linux-amd64

      - name: Copy binary (bypass .dockerignore)
        run: |
          cp mmwf-linux-amd64 mmwf-cracked
          chmod +x mmwf-cracked

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        run: |
          docker build -f Dockerfile.cracked \
            -t ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest \
            -t ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.sha }} \
            .
          docker push --all-tags ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
