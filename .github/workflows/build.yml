name: Build mmwf

on:
  workflow_dispatch:
  push:
    branches: [main]

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: leslie159357/mmwf

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - goos: linux
            goarch: amd64
            output: mmwf-linux-amd64
          - goos: windows
            goarch: amd64
            output: mmwf-windows-amd64.exe
    steps:
      - uses: actions/checkout@v4
        with:
          repository: Leslie159357/mmwf
          ref: main

      - name: Get missing files from original repo
        run: |
          mkdir -p cmd/server subscribes internal/web/dist/assets internal/web/dist/images
          curl -sL "https://raw.githubusercontent.com/iluobei/miaomiaowuX/main/cmd/server/main.go" -o cmd/server/main.go
          curl -sL "https://raw.githubusercontent.com/iluobei/miaomiaowuX/main/cmd/server/cors.go" -o cmd/server/cors.go
          curl -sL "https://raw.githubusercontent.com/iluobei/miaomiaowuX/main/subscribes/embed.go" -o subscribes/embed.go
          curl -sL "https://raw.githubusercontent.com/iluobei/miaomiaowuX/main/subscribes/.gitignore" -o subscribes/.gitignore
          curl -sL "https://raw.githubusercontent.com/iluobei/miaomiaowuX/main/subscribes/.keep.yaml" -o subscribes/.keep.yaml
          curl -sL "https://raw.githubusercontent.com/iluobei/miaomiaowuX/main/subscribes/README.md" -o subscribes/README.md

      - name: Download full frontend SPA from miaomiaowux.com
        run: |
          SITE="https://miaomiaowux.com"
          DIST="internal/web/dist"
          mkdir -p "$DIST/assets" "$DIST/images"
          curl -sL "$SITE/" -o "$DIST/index.html"
          for url in $(grep -oP '(?:src|href)="([^"]+\.(js|css))"' "$DIST/index.html" | sed 's/.*"\(.*\)".*/\1/'); do
            echo "DL: $url"
            mkdir -p "$DIST/$(dirname $url)"
            curl -sL "$SITE$url" -o "$DIST/$url"
          done
          MAIN_JS=$(grep -oP 'src="([^"]+\.js)"' "$DIST/index.html" | head -1 | sed 's/.*"\(.*\)".*/\1/')
          echo "Main JS: $MAIN_JS"
          if [ -f "$DIST$MAIN_JS" ]; then
            grep -oP '"[a-zA-Z0-9_/.-]+\.js"' "$DIST$MAIN_JS" | sed 's/"//g' | sort -u > /tmp/chunks.txt
            total=$(wc -l < /tmp/chunks.txt)
            echo "Found $total JS file references"
            while IFS= read -r jsfile; do
              [ -z "$jsfile" ] && continue
              dir=$(dirname "$jsfile")
              mkdir -p "$DIST/$dir"
              if [ ! -f "$DIST/$jsfile" ]; then
                echo "  DL: $jsfile"
                curl -sL "$SITE/$jsfile" -o "$DIST/$jsfile"
              fi
            done < /tmp/chunks.txt
          fi
          curl -sL "$SITE/images/favicon.ico" -o "$DIST/images/favicon.ico" 2>/dev/null || true
          touch "$DIST/images/.gitkeep"
          echo "=== DIST SUMMARY ==="
          find "$DIST" -type f | wc -l
          du -sh "$DIST"
          find "$DIST/assets" -name "*.js" | wc -l

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Build binary
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: 0
        run: |
          mkdir -p build
          go build -trimpath -ldflags="-s -w" -o "build/${{ matrix.output }}" ./cmd/server

      - name: Upload binary artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.output }}
          path: build/${{ matrix.output }}
          retention-days: 30

  docker:
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4
        with:
          repository: Leslie159357/mmwf
          ref: main

      - name: Download linux binary
        uses: actions/download-artifact@v4
        with:
          name: mmwf-linux-amd64

      - name: Copy binary (bypass .dockerignore)
        run: |
          cp mmwf-linux-amd64 mmwf-cracked
          chmod +x mmwf-cracked

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        run: |
          docker build -f Dockerfile.cracked \
            -t ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest \
            -t ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.sha }} \
            .
          docker push --all-tags ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
