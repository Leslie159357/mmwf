name: 🏗️ 自动构建 mmwf 破解版

on:
  workflow_dispatch:
  push:
    branches: [main]

permissions:
  contents: read
  packages: read

jobs:
  build:
    name: 构建破解版二进制
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - goos: linux
            goarch: amd64
            output: mmwf-linux-amd64
          - goos: linux
            goarch: arm64
            output: mmwf-linux-arm64
          - goos: windows
            goarch: amd64
            output: mmwf-windows-amd64.exe

    steps:
      - name: Checkout mmwf repo
        uses: actions/checkout@v4
        with:
          repository: Leslie159357/mmwf
          ref: main

      - name: 下载缺失的入口文件（cmd/server/）
        run: |
          mkdir -p cmd/server
          curl -sL "https://raw.githubusercontent.com/iluobei/miaomiaowuX/main/cmd/server/main.go" -o cmd/server/main.go
          curl -sL "https://raw.githubusercontent.com/iluobei/miaomiaowuX/main/cmd/server/cors.go" -o cmd/server/cors.go
          echo "OK: cmd/server/main.go and cors.go downloaded"

      - name: 🌐 从官网下载前端 dist
        run: |
          SITE="https://miaomiaowux.com"
          DIST_DIR="internal/web/dist"
          ASSETS_DIR="$DIST_DIR/assets"
          IMAGES_DIR="$DIST_DIR/images"
          mkdir -p "$ASSETS_DIR" "$IMAGES_DIR"

          # 下载 index.html
          echo "下载 index.html..."
          curl -sL "$SITE/" -o "$DIST_DIR/index.html"

          # 从 index.html 提取 JS/CSS 资源并下载
          echo "下载主 JS / CSS 资源..."
          for url in $(grep -oP '(?:src|href)="([^"]+\.(js|css))"' "$DIST_DIR/index.html" | sed 's/.*"\(.*\)".*/\1/'); do
            file="$DIST_DIR/$url"
            mkdir -p "$(dirname "$file")"
            echo "  下载: $url"
            curl -sL "$SITE$url" -o "$file"
          done

          # 从 index.html 提取图片资源
          for url in $(grep -oP 'content="([^"]+\.(png|ico|svg|webp))"' "$DIST_DIR/index.html" | sed 's/.*"\(.*\)".*/\1/'); do
            file="$DIST_DIR/$url"
            mkdir -p "$(dirname "$file")"
            echo "  下载: $url"
            curl -sL "$SITE$url" -o "$file"
          done

          # 下载 favicon
          for url in $(grep -oP 'href="([^"]+\.(ico|png|svg))"' "$DIST_DIR/index.html" | sed 's/.*"\(.*\)".*/\1/'); do
            file="$DIST_DIR/$url"
            mkdir -p "$(dirname "$file")"
            echo "  下载: $url"
            curl -sL "$SITE$url" -o "$file"
          done

          # 从主 JS 中提取 __vite__mapDeps 列表并下载所有额外 JS 文件
          MAIN_JS=$(grep -oP 'src="([^"]+\.js)"' "$DIST_DIR/index.html" | head -1 | sed 's/.*"\(.*\)".*/\1/')
          echo "主 JS: $MAIN_JS"

          if [ -n "$MAIN_JS" ] && [ -f "$DIST_DIR/$MAIN_JS" ]; then
            echo "从主 JS 提取依赖列表..."
            # 提取 m.f=[...] 数组中的 JS 文件路径
            grep -oP 'm\.f=\["[^"]*"'(?:(?:(?::'(?::'[^']*'')?)?!)?,'\''[^'']*'\'')*' "$DIST_DIR/$MAIN_JS" > /tmp/deps_raw.txt 2>/dev/null || true
            # 更简单: 直接提取 m.f=["..."] 中双引号内的内容
            python3 -c "
import re, os
with open('$DIST_DIR/$MAIN_JS', 'r', encoding='utf-8', errors='ignore') as f:
    content = f.read()
# Find m.f=[...] array
match = re.search(r'm\.f=\[([^\]]+)\]', content)
if match:
    items = re.findall(r'\"([^\"]+\.js)\"', match.group(1))
    for item in items:
        print(item)
" > /tmp/js_deps.txt 2>/dev/null || true

            if [ -s /tmp/js_deps.txt ]; then
              echo "发现 $(wc -l < /tmp/js_deps.txt) 个额外 JS 文件"
              while IFS= read -r jsfile; do
                [ -z "$jsfile" ] && continue
                outfile="$DIST_DIR/$jsfile"
                mkdir -p "$(dirname "$outfile")"
                if [ ! -f "$outfile" ]; then
                  echo "  下载: $jsfile"
                  curl -sL "$SITE/$jsfile" -o "$outfile"
                fi
              done < /tmp/js_deps.txt
            else
              echo "未从主 JS 提取到依赖，尝试备用方法..."
              # 备用: 硬编码已知依赖列表
              cat > /tmp/js_fallback.txt << 'EOF'
