name: 🏗️ 自动构建 mmwf 破解版

on:
  workflow_dispatch:
    inputs:
      version:
        description: 原版版本号（留空自动获取最新）
        required: false
        default: ''
  push:
    branches: [main]

permissions:
  contents: read
  packages: read

jobs:
  build:
    name: 构建破解版二进制
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - goos: linux
            goarch: amd64
            output: mmwf-linux-amd64
          - goos: linux
            goarch: arm64
            output: mmwf-linux-arm64
          - goos: windows
            goarch: amd64
            output: mmwf-windows-amd64.exe

    steps:
      - name: Checkout mmwf repo
        uses: actions/checkout@v4
        with:
          repository: Leslie159357/mmwf
          ref: main

      - name: 下载缺失的入口文件（cmd/server/）
        run: |
          mkdir -p cmd/server
          curl -sL "https://raw.githubusercontent.com/iluobei/miaomiaowuX/main/cmd/server/main.go" -o cmd/server/main.go
          curl -sL "https://raw.githubusercontent.com/iluobei/miaomiaowuX/main/cmd/server/cors.go" -o cmd/server/cors.go
          echo "OK: cmd/server/main.go and cors.go downloaded"

      - name: 从官方 Docker 镜像提取前端 dist
        run: |
          echo "登录 ghcr.io..."
          echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin 2>/dev/null; true
          echo "拉取官方镜像..."
          docker pull ghcr.io/iluobei/miaomiaowuX:latest; pull_ok=$?
          if [ $pull_ok -ne 0 ]; then
            echo "ghcr.io 拉取失败，尝试备用方式..."
            LATEST=$(curl -sL https://api.github.com/repos/iluobei/miaomiaowuX/releases/latest | grep '"tag_name"' | head -1 | cut -d'"' -f4)
            echo "最新原版版本: $LATEST"
            curl -sL "https://github.com/iluobei/miaomiaowuX/releases/download/${LATEST}/mmwx-linux-amd64" -o /tmp/mmwx-original
            chmod +x /tmp/mmwx-original
            mkdir -p internal/web/dist
            echo "WARNING: 无法从 Docker 镜像提取前端 dist"
            echo "请手动将前端 dist 文件放入 internal/web/dist/ 后重试"
            exit 1
          fi
          echo "从镜像中提取前端文件..."
          docker create --name mmwx-tmp ghcr.io/iluobei/miaomiaowuX:latest
          docker cp mmwx-tmp:/app/internal/web/dist ./internal/web/dist
          docker rm mmwx-tmp
          if [ -d "internal/web/dist" ] && [ "$(ls -A internal/web/dist 2>$null)" ]; then
            echo "OK: 前端 dist 提取成功"
            ls -la internal/web/dist/
          else
            echo "FAIL: 前端 dist 提取失败"
            exit 1
          fi

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: 编译 ${{ matrix.output }}
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: 0
        run: |
          mkdir -p build
          go build -trimpath -ldflags="-s -w" -o "build/${{ matrix.output }}" ./cmd/server
          echo "OK: 编译完成 build/${{ matrix.output }}"

      - name: 上传构建产物
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.output }}
          path: build/${{ matrix.output }}
          retention-days: 30