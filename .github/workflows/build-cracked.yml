name: Build mmwf Cracked

on:
  workflow_dispatch:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - goos: linux
            goarch: amd64
            output: mmwf-linux-amd64
          - goos: windows
            goarch: amd64
            output: mmwf-windows-amd64.exe

    steps:
      - uses: actions/checkout@v4
        with:
          repository: Leslie159357/mmwf
          ref: main

      - name: Get cmd/server
        run: |
          mkdir -p cmd/server
          curl -sL "https://raw.githubusercontent.com/iluobei/miaomiaowuX/main/cmd/server/main.go" -o cmd/server/main.go
          curl -sL "https://raw.githubusercontent.com/iluobei/miaomiaowuX/main/cmd/server/cors.go" -o cmd/server/cors.go

      - name: Download frontend from official site
        run: |
          SITE="https://miaomiaowux.com"
          DIST="internal/web/dist"
          mkdir -p "$DIST/assets" "$DIST/images"
          curl -sL "$SITE/" -o "$DIST/index.html"
          echo "--- index.html ---"
          head -20 "$DIST/index.html"
          echo ""
          for url in $(grep -oP '(?:src|href)="([^"]+\.(js|css))"' "$DIST/index.html" | sed 's/.*"\(.*\)".*/\1/'); do
            echo "Downloading: $url"
            curl -sL "$SITE$url" -o "$DIST/$url"
          done
          MAIN_JS=$(grep -oP 'src="([^"]+\.js)"' "$DIST/index.html" | head -1 | sed 's/.*"\(.*\)".*/\1/')
          echo "Main JS: $MAIN_JS"
          if [ -n "$MAIN_JS" ] && [ -f "$DIST/$MAIN_JS" ]; then
            python3 -c "
import re
with open('$DIST/$MAIN_JS','r',encoding='utf-8',errors='ignore') as f:
    c=f.read()
m=re.search(r'm\.f=\[([^\]]+)\]',c)
if m:
    for i in re.findall(r'\"([^\"]+\.js)\"',m.group(1)):
        print(i)
" > /tmp/deps.txt 2>/dev/null || true
            if [ -s /tmp/deps.txt ]; then
              while IFS= read -r js; do
                [ -z "$js" ] && continue
                echo "Dep JS: $js"
                mkdir -p "$DIST/$(dirname $js)"
                curl -sL "$SITE/$js" -o "$DIST/$js"
              done < /tmp/deps.txt
            fi
          fi
          echo "=== DIST FILES ==="
          find "$DIST" -type f | wc -l
          du -sh "$DIST"

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Build
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: 0
        run: |
          mkdir -p build
          go build -trimpath -ldflags="-s -w" -o "build/${{ matrix.output }}" ./cmd/server

      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.output }}
          path: build/${{ matrix.output }}
          retention-days: 30
