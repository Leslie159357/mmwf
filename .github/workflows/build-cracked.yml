              while IFS= read -r jsfile; do
                [ -z "$jsfile" ] && continue
                outfile="$DIST_DIR/$jsfile"
                mkdir -p "$(dirname "$outfile")"
                if [ ! -f "$outfile" ]; then
                  echo "  下载: $jsfile"
                  curl -sL "$SITE/$jsfile" -o "$outfile"
                fi
              done < /tmp/js_fallback.txt
            fi
          fi

          # 验证下载结果
          echo ""
          echo "=== 下载统计 ==="
          find "$DIST_DIR" -type f | wc -l | xargs echo "文件总数:"
          du -sh "$DIST_DIR" | awk '{print "总大小:", $1}'
          echo ""
          echo "=== dist 目录结构 ==="
          find "$DIST_DIR" -type f | sort

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: 编译 ${{ matrix.output }}
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: 0
        run: |
          mkdir -p build
          go build -trimpath -ldflags="-s -w" -o "build/${{ matrix.output }}" ./cmd/server
          echo "OK: 编译完成 build/${{ matrix.output }}"

      - name: 上传构建产物
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.output }}
          path: build/${{ matrix.output }}
          retention-days: 30